apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      containers:
        - name: product-api
          image: fmiawbd/product-service
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              #value: "envoy"
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: redis-host
            - name: REDIS_PORT
              #value: "5000"
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: redis-port
            - name: MYSQL_HOST
              value: "mysql"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              #value: "root"
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: mysql-user
            - name: MYSQL_PASSWORD
              #value: "password"
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: mysql-root-password

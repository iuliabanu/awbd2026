apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: data
type: Opaque
stringData:
  # MySQL credentials (stringData automatically base64 encodes)
  mysql-root-password: "password"
  mysql-database: "productdb"
  mysql-user: "root"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: data
type: Opaque
stringData:
  # Redis connection details
  redis-host: "envoy.data.svc.cluster.local"
  redis-port: "5000"

apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  namespace: auth
type: Opaque
stringData:
  # Keycloak admin console credentials
  admin-user: "admin"
  admin-password: "admin"
  # OAuth2 client secret — used by Spring Cloud Gateway and product-api
  # to authenticate against Keycloak (client-credentials grant).
  # Must match the client secret configured in the Keycloak realm.
  client-secret: "changeme-client-secret"
---
# Mirror of the client-secret in the app namespace so Spring Cloud Gateway
# and product-api can reference it without cross-namespace secret access.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  namespace: app
type: Opaque
stringData:
  # Keycloak issuer URI consumed by Spring Security oauth2-resource-server.
  # Format: http://<service>.<namespace>.svc.cluster.local:<port>/realms/<realm>
  issuer-uri: "http://keycloak.auth.svc.cluster.local:8080/realms/demo"
  client-secret: "changeme-client-secret"

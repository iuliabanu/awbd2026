apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: app
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  # ClusterIP: the Ingress controller reaches the gateway cluster-internally.
  # External clients never talk to the gateway directly — they go through
  # the Ingress (TLS termination) which forwards to this ClusterIP.
  # DNS: gateway.app.svc.cluster.local:80
  type: ClusterIP
